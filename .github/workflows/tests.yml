name: tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: shellcheck
        # severity=warning catches real bugs (bad quoting, cd failures, undefined vars)
        # without failing on the many info/style nits in scripts predating linting.
        run: |
          shellcheck --severity=warning install.sh sync-lessons.sh hooks/*.sh scripts/*.sh tests/*.sh

      - name: install.sh smoke + idempotency
        run: bash tests/install_smoke.sh

      - name: session-scan behavior
        run: bash tests/session_scan.sh

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Compile-check helper scripts
        run: python -m py_compile scripts/*.py

      - name: Validate command/skill frontmatter
        run: python tests/validate_frontmatter.py

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
